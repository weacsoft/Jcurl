spring:
  main:
    web-application-type: none   # 非 Web 模式, 不启动 Tomcat
    headless: false              # 允许 JavaFX GUI
    banner-mode: off             # 关闭启动横幅
    lazy-initialization: true    # 延迟初始化 Bean, 加快启动
  application:
    name: Jcurl2
  # 关闭不需要的自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jms.JmsAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration
      - org.springframework.boot.autoconfigure.batch.BatchAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.actuate.metrics.MetricsAutoConfiguration

# Jcurl2 自定义配置
jcurl2:
  # 数据存储根目录(默认用户主目录下 .api-client)
  data-dir: ${user.home}/.api-client
  # 历史记录上限
  history-limit: 500
  # 默认主题: light / dark
  theme: dark
